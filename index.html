<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kreszprofesszor és Mosolyzóna Autósiskola beiratkozási adatlap</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">

    <!-- Preload kulcsfontosságú JS fájlok iOS sebességnöveléséhez -->
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">
    <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script">
    <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script">
    <link rel="modulepreload" href="./js/main.js?v=202602241835">
    <link rel="modulepreload" href="./js/App.js">
    <link rel="modulepreload" href="./js/firebase.js">
    <link rel="modulepreload" href="./js/RegistrationForm.js">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <!-- React és ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Egyedi stílusok -->
    <link rel="stylesheet" href="./jelentkezes.css">

    <!-- MÓDOSÍTÁS: Betöltésjelző stílusai -->
    <style>
        #loader {
            position: fixed;
            inset: 0;
            background-color: rgb(241 245 249); /* bg-slate-100 */
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease-in-out;
        }
        .loader-content {
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #4f46e5; /* Tailwind indigo-600 */
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- MÓDOSÍTÁS: Betöltésjelző HTML -->
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="mt-4 text-lg font-semibold text-gray-700">Oldal betöltése...</p>
        </div>
    </div>

    <!-- A React alkalmazás ide töltődik be -->
    <div id="root"></div>

    <!-- Fő alkalmazás szkript (ES Modulként) -->
    <script type="module" src="./js/main.js?v=202602241835"></script>
</body>
</html>
